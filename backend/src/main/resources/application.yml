server:
  port: 8088
  servlet:
    context-path: /api/v1

spring:
  application:
    name: studenthub-backend
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/studenthub.db?journal_mode=WAL&foreign_keys=ON&busy_timeout=5000
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    locations: classpath:db/migration
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:your_deepseek_api_key_here}
      base-url: https://api.deepseek.com

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 2592000 # 30 天
  active-timeout: 1800 # 30 分钟无操作自动挂起
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: studenthub-bucket

studenthub:
  security:
    aes-key: "StudentHubDevSecretKey2026AES256"

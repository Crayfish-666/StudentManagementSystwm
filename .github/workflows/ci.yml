# =============================================================================
# StudentHub · CI 构建 + 部署 (dev)
# -----------------------------------------------------------------------------
# 触发: push 到 develop
# 流程: 构建 Docker 镜像 -> 推送到自建 Registry -> SSH 部署到 dev 服务器
# 依据: docs/02_ADR.md §3.5 dev 环境: develop 分支 push 自动部署
# 凭据: 见 .github/SECRETS.md
# =============================================================================
name: ci-dev

on:
  push:
    branches: [develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'studenthub' }}
  REGISTRY: ${{ secrets.REGISTRY_URL }}

jobs:
  # ---------------------------------------------------------------------------
  # 构建 + 推送镜像
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=develop-latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=studenthub
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        if: env.REGISTRY != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ env.REGISTRY != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ---------------------------------------------------------------------------
  # SSH 部署到 dev 服务器
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Dev Server
    needs: build
    runs-on: ubuntu-latest
    if: env.REGISTRY != '' && github.event_name == 'push'
    environment:
      name: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deploy script
        run: |
          mkdir -p ./.github/_ssh
          cp ./deploy/deploy.sh ./.github/_ssh/deploy.sh
          chmod +x ./.github/_ssh/deploy.sh

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: '.github/_ssh/deploy.sh'
          target: '~/studenthub-deploy/'

      - name: Trigger remote deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            export REGISTRY_URL='${{ secrets.REGISTRY_URL }}'
            export REGISTRY_USERNAME='${{ secrets.REGISTRY_USERNAME }}'
            export REGISTRY_PASSWORD='${{ secrets.REGISTRY_PASSWORD }}'
            export IMAGE_TAG=develop-${{ github.sha }}
            bash ./deploy/deploy.sh
